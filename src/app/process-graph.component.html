@if (graph) {
  <div class="process-graph-shell">
    <header>
      <div>
        <h3>{{ graph.title }}</h3>
        <p>{{ graph.subtitle }}</p>
      </div>
      <span>{{ graph.nodes.length }} nodes / {{ graph.edges.length }} edges</span>
    </header>

    <div class="process-graph-layout">
      <aside class="process-graph-controls" aria-label="Graph visualization controls">
        <section>
          <header>
            <h4>Object Types</h4>
            <div class="mini-actions">
              <button type="button" class="mini-button" (click)="selectAllObjectTypes()">All</button>
              <button type="button" class="mini-button" (click)="clearObjectTypes()">None</button>
            </div>
          </header>

          <div class="object-type-options">
            @for (objectType of objectTypes; track objectType) {
              <label>
                <input
                  type="checkbox"
                  [checked]="isDraftObjectTypeSelected(objectType)"
                  (change)="toggleDraftObjectType(objectType, $event)"
                />
                <span>{{ objectType }}</span>
              </label>
            }
          </div>
        </section>

        <label class="frequency-control">
          <span>Activity Frequency</span>
          <strong>{{ draftActivityFrequency }}</strong>
          <input
            type="range"
            min="1"
            [max]="maxActivityFrequency()"
            [value]="draftActivityFrequency"
            (input)="onActivityFrequencyInput($event)"
          />
        </label>

        <label class="frequency-control">
          <span>Path Frequency</span>
          <strong>{{ draftPathFrequency }}</strong>
          <input
            type="range"
            min="1"
            [max]="maxPathFrequency()"
            [value]="draftPathFrequency"
            (input)="onPathFrequencyInput($event)"
          />
        </label>

        <button type="button" class="apply-button" (click)="applyDraftSettings()">Apply</button>
      </aside>

      <div class="process-graph-scroll">
        <svg
          class="process-graph"
          [attr.viewBox]="'0 0 ' + graph.width + ' ' + graph.height"
          [attr.width]="graphWidth()"
          [attr.height]="graph.height"
          role="img"
          [attr.aria-label]="graph.title"
        >
          <defs>
            @for (edge of graph.edges; track edge.id) {
              <marker
                [attr.id]="markerId(edge)"
                viewBox="0 0 10 10"
                refX="8"
                refY="5"
                markerWidth="4"
                markerHeight="4"
                orient="auto-start-reverse"
              >
                <path d="M 0 0 L 10 5 L 0 10 z" [attr.fill]="edgeColor(edge)"></path>
              </marker>
            }
          </defs>

          @for (edge of graph.edges; track edge.id) {
            <path
              [attr.class]="'process-edge process-edge-' + edge.kind"
              [attr.d]="edge.path"
              [attr.stroke]="edgeColor(edge)"
              [attr.stroke-width]="edgeStrokeWidth(edge)"
              [attr.marker-end]="edge.directed ? 'url(#' + markerId(edge) + ')' : null"
            >
              <title>{{ edge.title || edge.label }}</title>
            </path>
            <text class="process-edge-label" [attr.x]="edge.label_x" [attr.y]="edge.label_y">
              {{ edge.label }}
            </text>
          }

          @for (node of graph.nodes; track node.id) {
            <g [attr.class]="'process-node process-node-' + node.kind">
              <title>{{ node.label }} ({{ node.count }})</title>
              @if (node.shape === 'ellipse') {
                <ellipse
                  class="process-node-shape"
                  [attr.cx]="node.x + node.width / 2"
                  [attr.cy]="node.y + node.height / 2"
                  [attr.rx]="node.width / 2"
                  [attr.ry]="node.height / 2"
                  [attr.fill]="nodeFill(node)"
                  [attr.fill-opacity]="nodeFillOpacity(node)"
                  [attr.stroke]="nodeStroke(node)"
                  [attr.stroke-width]="nodeStrokeWidth(node)"
                ></ellipse>
              } @else {
                <rect
                  class="process-node-shape"
                  [attr.x]="node.x"
                  [attr.y]="node.y"
                  [attr.width]="node.width"
                  [attr.height]="node.height"
                  [attr.fill]="nodeFill(node)"
                  [attr.fill-opacity]="nodeFillOpacity(node)"
                  [attr.stroke]="nodeStroke(node)"
                  [attr.stroke-width]="nodeStrokeWidth(node)"
                ></rect>
              }
              <text
                [attr.x]="node.x + node.width / 2"
                [attr.y]="node.y + node.height / 2 - node.lines.length * 7"
              >
                @for (line of node.lines; track $index) {
                  <tspan [attr.x]="node.x + node.width / 2" [attr.dy]="$first ? 0 : 14">
                    {{ line }}
                  </tspan>
                }
                <tspan
                  class="process-node-count"
                  [attr.x]="node.x + node.width / 2"
                  dy="18"
                >
                  {{ node.count }}
                </tspan>
              </text>
            </g>
          }
        </svg>
      </div>
    </div>
  </div>
}
