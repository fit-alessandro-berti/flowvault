<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Flowvault</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta
    name="description"
    content="Flowvault brings State-Aware Object-Centric Process Mining to OCEL 2.0 event logs."
  >
  <style>
    :root {
      color-scheme: light;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: #fbfaf7;
      color: #171717;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 760px);
      display: grid;
      justify-items: center;
      gap: 24px;
      text-align: center;
    }

    .eyebrow {
      margin: 0;
      color: #6f6a5f;
      font-size: 0.92rem;
      font-weight: 800;
      line-height: 1.4;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 6.5rem;
      line-height: 0.95;
      letter-spacing: 0;
      font-weight: 900;
    }

    p {
      max-width: 560px;
      margin: 0;
      color: #4c4a43;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .lead {
      max-width: 680px;
      color: #171717;
      font-size: 1.34rem;
      font-weight: 650;
      line-height: 1.45;
    }

    .support {
      margin-top: -8px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 148px;
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid #171717;
      background: #171717;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.86rem;
      letter-spacing: 0;
      text-transform: uppercase;
      transition:
        background 160ms ease,
        color 160ms ease,
        transform 160ms ease;
    }

    a:hover {
      background: transparent;
      color: #171717;
      transform: translateY(-1px);
    }

    a:focus-visible {
      outline: 3px solid #2f80ed;
      outline-offset: 3px;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 3.4rem;
      }

      .lead {
        font-size: 1.12rem;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">State-Aware Object-Centric Process Mining</p>
    <h1>FLOWVAULT</h1>
    <p class="lead">Reveal explicit state transitions across object lifecycles in OCEL 2.0 event logs.</p>
    <p class="support">Import object-centric logs, derive event states, and inspect state-aware process patterns directly in your browser.</p>
    <a id="explore-link" href="browser/index.html">EXPLORE</a>
  </main>
  <script>
    const link = document.querySelector("#explore-link");

    link.addEventListener("click", (event) => {
      event.preventDefault();

      const target = new URL("browser/index.html", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.href = target;
    });
  </script>
</body>
</html>
