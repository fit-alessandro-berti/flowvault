<aside class="feature-sidebar" aria-label="Feature selector">
  <section>
    <h2>General</h2>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'statistics'"
      (click)="vm.setActiveFeature('statistics')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 19h16M7 16V9m5 7V5m5 11v-4" />
      </svg>
      <span>Statistics</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'stateDetection'"
      (click)="vm.setActiveFeature('stateDetection')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 18l4-5 4 3 6-9" />
        <circle cx="5" cy="18" r="2" />
        <circle cx="9" cy="13" r="2" />
        <circle cx="13" cy="16" r="2" />
        <circle cx="19" cy="7" r="2" />
      </svg>
      <span>State Detection</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'causalModel'"
      (click)="vm.setActiveFeature('causalModel')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="5" cy="7" r="2" />
        <circle cx="12" cy="12" r="2" />
        <circle cx="19" cy="17" r="2" />
        <path d="M7 8l3 3m4 2l3 3M12 5v5m0 4v5" />
      </svg>
      <span>Causal Model</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'ocdfg'"
      (click)="vm.setActiveFeature('ocdfg')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="6" cy="12" r="3" />
        <circle cx="18" cy="7" r="3" />
        <circle cx="18" cy="17" r="3" />
        <path d="M9 11l6-3M9 13l6 3" />
      </svg>
      <span>Object-Centric DFG</span>
    </button>
  </section>

  <section>
    <h2>State-Based</h2>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'patterns'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('patterns')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 7h14M5 12h14M5 17h9" />
        <circle cx="5" cy="7" r="1.5" />
        <circle cx="5" cy="12" r="1.5" />
        <circle cx="5" cy="17" r="1.5" />
      </svg>
      <span>Patterns</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'vm.stateAwareOcdfg'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('vm.stateAwareOcdfg')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 12h6l4-6v12l4-6h2" />
        <circle cx="4" cy="12" r="2" />
        <circle cx="20" cy="12" r="2" />
      </svg>
      <span>State-Aware OC-DFG</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'vm.timePerspective'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('vm.timePerspective')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 18h16M5 15c3-8 6-8 9-2 2 4 4 4 6-4" />
        <path d="M7 6v3m5-5v5m5-3v3" />
      </svg>
      <span>Time Perspective</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'correlation'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('correlation')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 18l5-6 4 3 7-9" />
        <path d="M4 6h4m8 12h4" />
        <circle cx="9" cy="12" r="2" />
        <circle cx="13" cy="15" r="2" />
      </svg>
      <span>Correlation</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'transitionKpis'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('transitionKpis')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 6h6v6H4zM14 6h6v6h-6zM4 16h6v2H4zM14 16h6v2h-6z" />
        <path d="M10 9h4m-4 8h4" />
      </svg>
      <span>Transition KPIs</span>
    </button>
    <button
      type="button"
      class="feature-button"
      [class.is-selected]="vm.activeFeature() === 'lifecycle'"
      [disabled]="!vm.hasAppliedState()"
      (click)="vm.setActiveFeature('lifecycle')"
    >
      <svg class="feature-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 18h16M6 15V7m6 8V5m6 10V9" />
        <circle cx="6" cy="15" r="2" />
        <circle cx="12" cy="15" r="2" />
        <circle cx="18" cy="15" r="2" />
      </svg>
      <span>Lifecycle Timeline</span>
    </button>
  </section>
</aside>
