@if (vm.causalFitGraph(); as graph) {
  <section class="causal-fit-panel" aria-label="Fitted causal graph">
    <header>
      <h2>Fitted Graph</h2>
      <span>{{ vm.causalFit()?.sample_count }} objects</span>
    </header>
    <div class="causal-fit-scroll">
      <svg
        class="causal-fit-graph"
        [attr.viewBox]="'0 0 ' + graph.width + ' ' + graph.height"
        [attr.width]="graph.width"
        [attr.height]="graph.height"
        role="img"
        aria-label="Fitted causal model"
      >
        <defs>
          <marker
            id="causal-arrow"
            viewBox="0 0 10 10"
            refX="8"
            refY="5"
            markerWidth="5"
            markerHeight="5"
            orient="auto"
          >
            <path d="M 0 0 L 10 5 L 0 10 z"></path>
          </marker>
        </defs>
        @for (edge of graph.edges; track edge.id) {
          <path
            class="causal-fit-edge"
            [attr.d]="edge.path"
            marker-end="url(#causal-arrow)"
          ></path>
          <text class="causal-fit-edge-label" [attr.x]="edge.labelX" [attr.y]="edge.labelY">
            I={{ edge.edge.intensity }} / p={{ edge.edge.p_value }}
          </text>
        }
        @for (node of graph.nodes; track node.id) {
          <g [attr.class]="'causal-fit-node causal-fit-node-' + node.role">
            <rect
              [attr.x]="node.x"
              [attr.y]="node.y"
              [attr.width]="node.width"
              [attr.height]="node.height"
            ></rect>
            <text [attr.x]="node.x + node.width / 2" [attr.y]="node.y + 24">
              @for (line of node.lines; track $index) {
                <tspan [attr.x]="node.x + node.width / 2" [attr.dy]="$first ? 0 : 14">
                  {{ line }}
                </tspan>
              }
            </text>
          </g>
        }
      </svg>
    </div>
  </section>
}
